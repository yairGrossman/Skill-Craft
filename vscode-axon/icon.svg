<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>

    <!-- Background gradient: deep brain-dark -->
    <radialGradient id="bgGrad" cx="42%" cy="48%" r="70%">
      <stop offset="0%"   stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#07050f"/>
    </radialGradient>

    <!-- Soma gradient: bright violet core -->
    <radialGradient id="somaGrad" cx="38%" cy="32%" r="65%">
      <stop offset="0%"   stop-color="#c4b5fd"/>
      <stop offset="55%"  stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#3b0764"/>
    </radialGradient>

    <!-- Axon gradient: violet → cyan -->
    <linearGradient id="axonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#818cf8"/>
      <stop offset="45%"  stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a5f3fc"/>
    </linearGradient>

    <!-- Myelin gradient: indigo segment -->
    <linearGradient id="myelinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>

    <!-- Soft glow (small) -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Bright glow (large) for soma + knobs -->
    <filter id="glowBig" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- ── Background ── -->
  <rect width="128" height="128" rx="20" fill="url(#bgGrad)"/>

  <!-- Subtle brain-gyri arcs in background -->
  <ellipse cx="82" cy="28" rx="44" ry="22" fill="none" stroke="#2e1065" stroke-width="1.2" opacity="0.55"/>
  <ellipse cx="88" cy="100" rx="38" ry="18" fill="none" stroke="#2e1065" stroke-width="1.2" opacity="0.55"/>
  <ellipse cx="24" cy="88" rx="18" ry="28" fill="none" stroke="#2e1065" stroke-width="1.2" opacity="0.4"/>

  <!-- ── Dendrites (left side, 3 branches, each forking) ── -->
  <!-- Branch upper -->
  <line x1="40" y1="58" x2="22" y2="38" stroke="#818cf8" stroke-width="1.8" opacity="0.75" filter="url(#glow)"/>
  <line x1="22" y1="38" x2="12" y2="26" stroke="#818cf8" stroke-width="1.1" opacity="0.55"/>
  <line x1="22" y1="38" x2="14" y2="34" stroke="#818cf8" stroke-width="1.1" opacity="0.55"/>
  <!-- tip dots -->
  <circle cx="12" cy="26" r="1.8" fill="#818cf8" opacity="0.6"/>
  <circle cx="14" cy="34" r="1.8" fill="#818cf8" opacity="0.6"/>

  <!-- Branch middle-left -->
  <line x1="38" y1="64" x2="16" y2="64" stroke="#818cf8" stroke-width="1.8" opacity="0.75" filter="url(#glow)"/>
  <line x1="16" y1="64" x2="8"  y2="57" stroke="#818cf8" stroke-width="1.1" opacity="0.55"/>
  <line x1="16" y1="64" x2="8"  y2="71" stroke="#818cf8" stroke-width="1.1" opacity="0.55"/>
  <circle cx="8"  cy="57" r="1.8" fill="#818cf8" opacity="0.6"/>
  <circle cx="8"  cy="71" r="1.8" fill="#818cf8" opacity="0.6"/>

  <!-- Branch lower -->
  <line x1="40" y1="70" x2="22" y2="90" stroke="#818cf8" stroke-width="1.8" opacity="0.75" filter="url(#glow)"/>
  <line x1="22" y1="90" x2="13" y2="101" stroke="#818cf8" stroke-width="1.1" opacity="0.55"/>
  <line x1="22" y1="90" x2="17" y2="104" stroke="#818cf8" stroke-width="1.1" opacity="0.55"/>
  <circle cx="13" cy="101" r="1.8" fill="#818cf8" opacity="0.6"/>
  <circle cx="17" cy="104" r="1.8" fill="#818cf8" opacity="0.6"/>

  <!-- ── Soma (cell body) ── -->
  <!-- Outer halo -->
  <circle cx="48" cy="64" r="16" fill="#7c3aed" opacity="0.18" filter="url(#glowBig)"/>
  <!-- Main soma -->
  <circle cx="48" cy="64" r="13" fill="url(#somaGrad)" filter="url(#glowBig)"/>
  <circle cx="48" cy="64" r="13" fill="none" stroke="#c4b5fd" stroke-width="1.2" opacity="0.6"/>
  <!-- Nucleus -->
  <circle cx="48" cy="64" r="4.5" fill="#1e1b4b" opacity="0.85"/>
  <circle cx="46" cy="62" r="1.5" fill="#818cf8" opacity="0.7"/>

  <!-- ── Axon hillock (taper from soma) ── -->
  <path d="M 60 61.5 Q 67 61 70 64 Q 67 67 60 66.5 Z" fill="#22d3ee" opacity="0.8"/>

  <!-- ── Axon (main cable) ── -->
  <line x1="61" y1="64" x2="114" y2="64" stroke="url(#axonGrad)" stroke-width="3" filter="url(#glow)"/>

  <!-- ── Myelin sheaths (3 segments, gap = node of Ranvier) ── -->
  <!-- Sheath 1 -->
  <rect x="71" y="58.5" width="13" height="11" rx="5.5" fill="url(#myelinGrad)" filter="url(#glow)" opacity="0.92"/>
  <rect x="71" y="58.5" width="13" height="11" rx="5.5" fill="none" stroke="#a78bfa" stroke-width="0.8" opacity="0.5"/>

  <!-- Sheath 2 -->
  <rect x="88" y="58.5" width="13" height="11" rx="5.5" fill="url(#myelinGrad)" filter="url(#glow)" opacity="0.88"/>
  <rect x="88" y="58.5" width="13" height="11" rx="5.5" fill="none" stroke="#a78bfa" stroke-width="0.8" opacity="0.5"/>

  <!-- Sheath 3 -->
  <rect x="105" y="58.5" width="10" height="11" rx="5.5" fill="url(#myelinGrad)" filter="url(#glow)" opacity="0.78"/>
  <rect x="105" y="58.5" width="10" height="11" rx="5.5" fill="none" stroke="#a78bfa" stroke-width="0.8" opacity="0.4"/>

  <!-- ── Axon terminal branches ── -->
  <line x1="114" y1="64" x2="122" y2="54" stroke="#22d3ee" stroke-width="1.6" filter="url(#glow)"/>
  <line x1="114" y1="64" x2="124" y2="64" stroke="#22d3ee" stroke-width="1.6" filter="url(#glow)"/>
  <line x1="114" y1="64" x2="122" y2="74" stroke="#22d3ee" stroke-width="1.6" filter="url(#glow)"/>

  <!-- Synaptic knobs -->
  <circle cx="122" cy="54" r="3" fill="#22d3ee" filter="url(#glowBig)"/>
  <circle cx="124" cy="64" r="3" fill="#22d3ee" filter="url(#glowBig)"/>
  <circle cx="122" cy="74" r="3" fill="#22d3ee" filter="url(#glowBig)"/>

  <!-- ── Action potential pulse (travelling dot on axon) ── -->
  <circle cx="82" cy="64" r="2.2" fill="#ffffff" opacity="0.95" filter="url(#glowBig)"/>

</svg>
